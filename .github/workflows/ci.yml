name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: lint / test / build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.22", "1.23"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: test
        run: go test -race -count=1 ./... ./internal/testdata/

      - name: build
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
          COMMIT=$(git rev-parse --short HEAD)
          BUILT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build -ldflags "-X main.version=$VERSION -X main.commit=$COMMIT -X main.built=$BUILT" -o bin/clarion ./cmd/clarion

      - name: smoke test
        run: ./bin/clarion version

      - name: no-exec-audit
        run: |
          if grep -r 'os\.Exec\|os\.StartProcess' --include='*.go' .; then
            echo "ERROR: os.Exec or os.StartProcess found in source" >&2
            exit 1
          fi
